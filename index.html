App.delDoc = i => {
  const t=getTrip(CUR_TRIP_ID); if(!t) return;
  const removed = t.documents[i];
  t.documents.splice(i,1); logEdit('Documents','removed '+(removed.name||'a document')); save(); rerender();
  toast('Document removed', ()=>{ t.documents.splice(Math.min(i,t.documents.length),0,removed); logEdit('Documents','restored '+(removed.name||'a document')); save(); rerender(); });
};

App.upload = input => {
  const file = input.files[0]; if(!file) return;
  const t = getTrip(CUR_TRIP_ID); if(!t) return;
  const isPdf = file.type==='application/pdf';
  if(isPdf){
    const fr = new FileReader();
    fr.onload = async e => {
      if(file.size > 2*1048576){ toast('PDF is over 2 MB, so only its details were stored.'); }
      const doc = {id:uid(), name:file.name, kind:'pdf', size:file.size,
                   dataUrl: file.size<=2*1048576 ? e.target.result : null, parsed:false};
      t.documents.push(doc); logEdit('Documents','uploaded '+file.name); save(); rerender();
      parsePdf(e.target.result, t, doc);
    };
    fr.readAsDataURL(file);
  } else {
    // image → downscale to keep localStorage happy
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      const scale = Math.min(1, 1400/Math.max(img.width,img.height));
      c.width = img.width*scale; c.height = img.height*scale;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      const dataUrl = c.toDataURL('image/jpeg',.72);
      t.documents.push({id:uid(), name:file.name, kind:'img', size:Math.round(dataUrl.length*.75), dataUrl, parsed:false});
      logEdit('Documents','uploaded '+file.name); save(); rerender();
      toast('Image saved. Auto-parsing works on PDF text, so add flight details manually if needed.');
    };
    img.src = URL.createObjectURL(file);
  }
  input.value='';
};

/* --- PDF text extraction + boarding pass heuristics --- */
async function parsePdf(dataUrl, trip, doc){
  const status = $('#parse-status');
  try{
    if(status) status.innerHTML = `<div class="banner">Scanning PDF for flight details…</div>`;
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const pdf = await pdfjsLib.getDocument({url:dataUrl}).promise;
    let text = '';
    for(let p=1; p<=Math.min(pdf.numPages,5); p++){
      const page = await pdf.getPage(p);
      const tc = await page.getTextContent();
      text += tc.items.map(it=>it.str).join(' ') + '\n';
    }
    const f = extractFlight(text);
    if(status) status.innerHTML='';
    if(f && (f.flightNo || (f.from&&f.to))){
      doc.parsed = true; save();
      App.flightForm(-1, f);
      toast('Flight details found. Please check them.');
    } else {
      toast('No flight details recognised. Add them in Trip info.');
    }
  }catch(e){
    if(status) status.innerHTML='';
    toast("Couldn't read that PDF. It may be a scanned image.");
  }
}
const AIRLINES = {BA:'British Airways',EZY:'easyJet',U2:'easyJet',FR:'Ryanair',RYR:'Ryanair',VS:'Virgin Atlantic',
  EK:'Emirates',QR:'Qatar Airways',LH:'Lufthansa',AF:'Air France',KL:'KLM',IB:'Iberia',VY:'Vueling',
  TP:'TAP Air Portugal',AA:'American Airlines',DL:'Delta',UA:'United',TK:'Turkish Airlines',EI:'Aer Lingus',
  LS:'Jet2',W6:'Wizz Air',SN:'Brussels Airlines',LX:'SWISS',AZ:'ITA Airways',SK:'SAS',AY:'Finnair'};
function extractFlight(text){
  const f = {};
  const T = text.replace(/\s+/g,' ');
  // flight number e.g. BA432, EZY8871, U2 8446, FR 1884
  const fm = T.match(/\b([A-Z]{2,3}|[A-Z]\d|\d[A-Z])\s?(\d{2,4})\b(?!\s?(?:kg|KG|cm|min))/);
  if(fm && (AIRLINES[fm[1]] || /^[A-Z]{2}$/.test(fm[1]))){
    f.flightNo = fm[1]+fm[2];
    f.airline = AIRLINES[fm[1]] || '';
  }
  // airline by name
  for(const name of Object.values(AIRLINES)){
    if(new RegExp(name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i').test(T)){ f.airline = name; break; }
  }
  // route: LHR-LIS / LHR → LIS / LHR to LIS
  const rm = T.match(/\b([A-Z]{3})\s?(?:-|–|—|→|to|TO|>)\s?([A-Z]{3})\b/);
  if(rm && rm[1]!==rm[2]){ f.from = rm[1]; f.to = rm[2]; }
  // times (first two HH:MM found)
  const times = T.match(/\b([01]?\d|2[0-3]):[0-5]\d\b/g);
  if(times){ f.depTime = times[0].padStart(5,'0'); if(times[1]) f.arrTime = times[1].padStart(5,'0'); }
  // seat e.g. 14C / seat 2A
  const sm = T.match(/\b(?:seat|SEAT|Seat)\s*:?\s*(\d{1,2}\s?[A-K])\b/) || T.match(/\b(\d{1,2}[A-F])\b(?=.*(?:board|gate|zone|Boarding|GATE))/i);
  if(sm) f.seat = sm[1].replace(/\s/,'');
  // booking ref: 6-char alphanumeric near "ref/booking/confirmation/PNR"
  const bm = T.match(/(?:booking|confirmation|reference|ref|PNR|record locator)[^A-Z0-9]{0,12}([A-Z0-9]{6})\b/i);
  if(bm) f.ref = bm[1].toUpperCase();
  // date
  const dm = T.match(/\b(\d{1,2})\s(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\s?(\d{4})?\b/i)
        || T.match(/\b(\d{4})-(\d{2})-(\d{2})\b/);
  if(dm){
    try{
      let d;
      if(dm[0].includes('-')) d = new Date(dm[0]+'T00:00:00');
      else d = new Date(`${dm[1]} ${dm[2]} ${dm[3]||new Date().getFullYear()}`);
      if(!isNaN(d)) f.date = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    }catch(e){}
  }
  return f;
}
/* ================= receipt scanning (OCR) ================= */
function downscaleToDataURL(file, max, quality, cb){
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    const scale = Math.min(1, max/Math.max(img.width,img.height));
    c.width = Math.round(img.width*scale); c.height = Math.round(img.height*scale);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    cb(c.toDataURL('image/jpeg', quality));
    URL.revokeObjectURL(img.src);
  };
  img.onerror = () => cb(null);
  img.src = URL.createObjectURL(file);
}
function ensureTesseract(cb){
  if(window.Tesseract){ cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js';
  s.onload = () => cb(); s.onerror = () => cb(new Error('load'));
  document.head.appendChild(s);
}
/* turn OCR text into candidate line items: "<description> ... <price>" */
function parseReceiptText(text){
  const skip = /(sub[\s-]?total|^total|balance|change|cash|card|visa|master|amex|vat|tax|gratuity|service|^tip|amount|payment|table|receipt|thank|www\.|http|tel[:\s]|order|invoice|qty)/i;
  const out = [];
  (text||'').split(/\r?\n/).forEach(line=>{
    const l = line.trim(); if(l.length<3) return;
    const m = l.match(/^(.*?)[\s.·•\-–—]*[£$€]?\s*(\d{1,4}[.,]\d{2})\s*[A-Z]?$/);
    if(!m) return;
    let desc = m[1].replace(/[.:·•\-–—\s]+$/,'').replace(/\s{2,}/g,' ').trim();
    desc = desc.replace(/^\d+\s*[xX]?\s*/, '').trim();     // drop leading quantity "2 x"
    const amount = parseFloat(m[2].replace(',','.'));
    if(!desc || !(amount>0) || amount>2000) return;
    if(skip.test(desc)) return;
    out.push({desc: desc.slice(0,40), amount, people:[]});
  });
  return out;
}
App.scanReceipt = input => {
  const file = input.files[0]; input.value=''; if(!file || !R) return;
  R.evenSplit = false; R._scanning = true; R._scanMsg = '';
  App.redrawReceipt();
  downscaleToDataURL(file, 1600, 0.85, dataUrl => {
    if(!dataUrl){ R._scanning=false; R._scanMsg="Couldn't read that image. Add items by hand."; App.redrawReceipt(); return; }
    ensureTesseract(err => {
      if(err || !window.Tesseract){ R._scanning=false; R._scanMsg="Couldn't load the scanner. Check you're online, or add items by hand."; App.redrawReceipt(); return; }
      window.Tesseract.recognize(dataUrl, 'eng')
        .then(({data}) => {
          const items = parseReceiptText(data && data.text || '');
          if(items.length){
            R.items = items;
            R._scanMsg = `Found ${items.length} item${items.length>1?'s':''}. Check them, then tick who had each.`;
          } else {
            if(!R.items.length) R.items = [{desc:'',amount:'',people:[]}];
            R._scanMsg = "Couldn't pick out items from that photo. Add them by hand.";
          }
          R._scanning=false; App.redrawReceipt();
        })
        .catch(() => { R._scanning=false; R._scanMsg='Scan failed. Add items by hand.'; App.redrawReceipt(); });
    });
  });
};

/* ================= TAB: money ================= */
function receiptTotal(r){
  return r.evenSplit ? (+r.amount||0) : (r.items||[]).reduce((s,it)=>s+(+it.amount||0),0);
}
function computeBalances(t){
  const net = {}; (t.participants||[]).forEach(p=>net[p]=0);
  (t.receipts||[]).forEach(r=>{
    const total = receiptTotal(r);
    if(net[r.paidBy]!==undefined) net[r.paidBy] += total;
    if(r.evenSplit){
      const ppl = (r.sharedWith&&r.sharedWith.length)?r.sharedWith:t.participants;
      ppl.forEach(p=>{ if(net[p]!==undefined) net[p] -= total/ppl.length; });
    } else {
      (r.items||[]).forEach(it=>{
        const ppl = (it.people&&it.people.length)?it.people:t.participants;
        ppl.forEach(p=>{ if(net[p]!==undefined) net[p] -= (+it.amount||0)/ppl.length; });
      });
    }
  });
  return net;
}
function settlements(net){
  const debt = [], cred = [];
  Object.entries(net).forEach(([p,v])=>{
    if(v < -0.005) debt.push({p, v:-v}); else if(v > 0.005) cred.push({p, v});
  });
  debt.sort((a,b)=>b.v-a.v); cred.sort((a,b)=>b.v-a.v);
  const out = [];
  let i=0, j=0;
  while(i<debt.length && j<cred.length){
    const pay = Math.min(debt[i].v, cred[j].v);
    out.push({from:debt[i].p, to:cred[j].p, amt:pay});
    debt[i].v -= pay; cred[j].v -= pay;
    if(debt[i].v < 0.005) i++;
    if(cred[j].v < 0.005) j++;
  }
  return out;
}
function tabMoney(t, ro){
  const receipts = (t.receipts||[]).map((r,i)=>{
    const total = receiptTotal(r);
    const detail = r.evenSplit
      ? `<div class="muted small">Split evenly between ${esc(((r.sharedWith&&r.sharedWith.length)?r.sharedWith:t.participants).join(', '))}</div>`
      : (r.items||[]).map(it=>`<div class="settle-row"><span>${esc(it.desc)} <span class="muted small">(${esc((it.people||[]).join(', ')||'everyone')})</span></span><span class="amount mono">${money(+it.amount||0)}</span></div>`).join('');
    return `
    <div class="card">
      <div class="section-head" style="margin-bottom:6px">
        <div><h3>${esc(r.title)}</h3><div class="muted small">${r.date?fmtDate(r.date)+' · ':''}paid by <strong>${esc(r.paidBy)}</strong></div></div>
        <div class="btn-row" style="align-items:center"><span class="amount mono" style="font-size:1.15rem">${money(total)}</span>
        ${!ro?`<button class="iconbtn edit" aria-label="Edit receipt" title="Edit" onclick="App.receiptForm(${i})">${ICONS.edit}</button>
               <button class="iconbtn del" aria-label="Remove receipt" title="Remove" onclick="App.delReceipt(${i})">${ICONS.trash}</button>`:''}</div>
      </div>
      ${detail}
    </div>`;
  }).join('');

  const net = computeBalances(t);
  const stl = settlements(net);
  const me = whoAmI(t.id);
  const myNet = (me && net[me]!==undefined) ? net[me] : null;
  const hasRec = (t.receipts||[]).length;
  return `
    ${myNet!==null && hasRec ? `
      <div class="you-balance ${myNet>0.005?'pos':myNet<-0.005?'neg':'zero'}">${myNet>0.005?`You're owed ${money(myNet)}`:myNet<-0.005?`You owe ${money(-myNet)}`:`You're all square 🤝`}</div>`:''}
    ${hasRec ? `
      <h2>Settle Up</h2>
      <p class="muted small" style="margin-bottom:8px">Debts are combined into the fewest possible payments, so one transfer can settle several people at once.</p>
      <div class="settle" style="margin-top:8px">
        ${stl.length ? stl.map(s=>`<div class="settle-row"><span><strong>${esc(s.from)}</strong> → <strong>${esc(s.to)}</strong></span><span class="amount mono">${money(s.amt)}</span></div>`).join('') : `<div class="muted" style="padding:8px 0">Everyone is settled up 🤝</div>`}
      </div>`:''}
    <h2 ${hasRec?'style="margin-top:30px"':''}>Receipts</h2>
    ${receipts || `<div class="empty">No shared costs yet.${!ro?'<br><br><button class="btn primary" onclick="App.receiptForm(-1)">+ Add Receipt</button>':''}</div>`}
    ${hasRec ? `
      <h2 style="margin-top:30px">Balances</h2>
      <div class="settle">
        ${Object.entries(net).map(([p,v])=>`<div class="settle-row ${p===me?'me':''}"><span>${esc(p)}${p===me?' <span class="muted small">(you)</span>':''}</span><span class="amount mono">${v>0.005?'is owed '+money(v):v<-0.005?'owes '+money(-v):'all square'}</span></div>`).join('')}
      </div>`:''}`;
}

/* --- receipt modal (temp state R while open) --- */
let R = null;
App.receiptForm = i => {
  const t = getTrip(CUR_TRIP_ID); if(!t) return;
  if(i>=0 && t.receipts[i]){
    const r = t.receipts[i];
    R = {title:r.title, date:r.date||'', paidBy:r.paidBy, evenSplit:!!r.evenSplit, amount:r.amount||'',
         sharedWith:[...(r.sharedWith||[])],
         items:(r.items||[]).length?(r.items||[]).map(it=>({desc:it.desc, amount:it.amount, people:[...(it.people||[])]})):[{desc:'',amount:'',people:[]}],
         _scanning:false, _scanMsg:'', _edit:i};
  } else {
    R = {title:'', date:todayStr(), paidBy:t.organiser, evenSplit:true, amount:'', sharedWith:[...t.participants], items:[{desc:'',amount:'',people:[]}], _scanning:false, _scanMsg:'', _edit:-1};
  }
  drawReceiptModal(t);
};
/* the live "who owes what / what's left to pay" panel — recomputed on every change */
function splitSummaryInner(t){
  const itemsTotal = R.items.reduce((s,it)=>s+(+it.amount||0),0);
  const unassigned = R.items.reduce((s,it)=>s+((it.people&&it.people.length)?0:(+it.amount||0)),0);
  const per = {}; t.participants.forEach(p=>per[p]=0);
  R.items.forEach(it=>{ const amt=+it.amount||0; if(!amt) return; const ppl=(it.people&&it.people.length)?it.people:t.participants; ppl.forEach(p=>{ if(per[p]!==undefined) per[p]+=amt/ppl.length; }); });
  return `
      <div class="row"><span>Items total</span><span class="mono">${money(itemsTotal)}</span></div>
      <div class="row"><span class="left ${unassigned<0.005?'clear':''}">${unassigned<0.005?'✓ Everything assigned':'Not ticked to anyone, shared by all'}</span><span class="mono">${money(unassigned)}</span></div>
      ${t.participants.some(p=>per[p]>0.005)?`<hr class="divider" style="margin:8px 0">${t.participants.map(p=>per[p]>0.005?`<div class="row"><span>${esc(p)} pays</span><span class="mono">${money(per[p])}</span></div>`:'').join('')}`:''}`;
}
App.updateSplitSum = () => { const el = $('.split-sum'); const t = getTrip(CUR_TRIP_ID); if(el && t) el.innerHTML = splitSummaryInner(t); };
function drawReceiptModal(t){
  const chip = (p, on, fn) => `<span class="chip pick ${on?'on':''}" role="button" tabindex="0" onclick="${fn}" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();${fn}}">${esc(p)}</span>`;
  const summary = `<div class="split-sum">${splitSummaryInner(t)}</div>`;
  const body = R.evenSplit ? `
    <div class="field"><label class="label" for="rc-amt">Total amount (£)</label><input id="rc-amt" type="number" step="0.01" min="0" value="${esc(R.amount)}" oninput="R.amount=this.value"></div>
    <div class="field"><label class="label">Split between</label>
      <div class="chips">${t.participants.map((p,i)=>chip(p, R.sharedWith.includes(p), `App.togglePerson(${i})`)).join('')}</div>
    </div>` : `
    <label class="label">Line items: tick who had each</label>
    ${R.items.map((it,i)=>`
      <div class="card flat" style="padding:12px;margin-bottom:10px">
        <div class="grid2" style="margin-bottom:8px">
          <input type="text" aria-label="Item description" placeholder="Item (e.g. Pizza)" value="${esc(it.desc)}" oninput="R.items[${i}].desc=this.value">
          <input type="number" aria-label="Item price" step="0.01" min="0" placeholder="£" value="${esc(it.amount)}" oninput="R.items[${i}].amount=this.value;App.updateSplitSum()">
        </div>
        <div class="chips">${t.participants.map((p,pi)=>chip(p, (it.people||[]).includes(p), `App.toggleItemPerson(${i},${pi})`)).join('')}</div>
        ${R.items.length>1?`<div style="text-align:right;margin-top:6px"><button class="iconbtn" aria-label="Remove item" onclick="R.items.splice(${i},1);App.redrawReceipt()">✕ Remove Item</button></div>`:''}
      </div>`).join('')}
    <button class="btn sm" onclick="R.items.push({desc:'',amount:'',people:[]});App.redrawReceipt()">+ Add Item</button>
    ${summary}`;
  openModal(`
    <h2>${R._edit>=0?'Edit Receipt':'Add Receipt'}</h2>
    <div class="grid2" style="gap:10px">
      <label class="btn" style="cursor:pointer" aria-label="Take a photo of the receipt">${ICONS.camera} Take a Photo
        <input type="file" accept="image/*" capture="environment" style="display:none" onchange="App.scanReceipt(this)"></label>
      <label class="btn" style="cursor:pointer" aria-label="Upload a receipt image">${ICONS.upload} Upload an Image
        <input type="file" accept="image/*" style="display:none" onchange="App.scanReceipt(this)"></label>
    </div>
    <p class="muted small" style="margin:8px 0 12px;text-align:center">Snap or upload the receipt and we'll list the items, then tick who had what.</p>
    ${R._scanning?`<div class="banner">⏳ Reading the receipt… this can take a few seconds.</div>`:''}
    ${R._scanMsg?`<div class="banner">${esc(R._scanMsg)}</div>`:''}
    <hr class="divider">
    <div class="grid2">
      <div class="field"><label class="label" for="rc-title">What was it?</label><input id="rc-title" type="text" value="${esc(R.title)}" placeholder="Dinner at Tasca" oninput="R.title=this.value"></div>
      <div class="field"><label class="label" for="rc-date">Date</label><input id="rc-date" type="date" value="${esc(R.date)}" oninput="R.date=this.value"></div>
    </div>

      <select id="rc-paid" onchange="R.paidBy=this.value">${t.participants.map(p=>`<option ${p===R.paidBy?'selected':''}>${esc(p)}</option>`).join('')}</select>
    </div>
    <div class="field">
      <label class="switch-row"><span>Even split</span>

      </label>

}
App.redrawReceipt = () => { const t = getTrip(CUR_TRIP_ID); if(t) drawReceiptModal(t); };
App.togglePerson = pi => {
  const t = getTrip(CUR_TRIP_ID); const p = t.participants[pi];
  const i = R.sharedWith.indexOf(p);
  if(i>=0) R.sharedWith.splice(i,1); else R.sharedWith.push(p);
  App.redrawReceipt();
};
App.toggleItemPerson = (idx,pi) => {
  const t = getTrip(CUR_TRIP_ID); const p = t.participants[pi];
  const it = R.items[idx]; it.people = it.people||[];
  const i = it.people.indexOf(p);
  if(i>=0) it.people.splice(i,1); else it.people.push(p);
  App.redrawReceipt();
};
App.saveReceipt = () => {
  const t = getTrip(CUR_TRIP_ID); if(!t||!R) return;
  if(!R.title.trim()) return markErr('#rc-title','Give the receipt a name');
  if(R.evenSplit){
    if(!(+R.amount>0)) return markErr('#rc-amt','Enter the amount');
    if(!R.sharedWith.length){ toast('Pick who shares it'); return; }
  } else {
    R.items = R.items.filter(it=>it.desc.trim()||+it.amount>0);
    if(!R.items.length || !R.items.some(it=>+it.amount>0)){ toast('Add at least one item with an amount'); return; }
  }
  const editing = R._edit>=0 && t.receipts[R._edit];
  const rec = {id: editing ? t.receipts[R._edit].id : uid(), title:R.title.trim(), date:R.date, paidBy:R.paidBy,
    evenSplit:R.evenSplit, amount:+R.amount||0, sharedWith:[...R.sharedWith],
    items:R.items.map(it=>({desc:it.desc.trim()||'Item', amount:+it.amount||0, people:[...(it.people||[])]}))};
  if(editing) t.receipts[R._edit] = rec; else t.receipts.push(rec);
  logEdit('Money',(editing?'edited receipt ':'added receipt ')+rec.title+' ('+money(receiptTotal(rec))+')');
  save(); R=null; closeModal(); rerender(); toast(editing?'Receipt updated':'Receipt added');
};
App.delReceipt = i => {
  const t = getTrip(CUR_TRIP_ID); if(!t) return;
  const removed = t.receipts[i];
  confirmModal('Remove This Receipt?', `"${removed.title}" (${money(receiptTotal(removed))}) will be removed.`, 'Remove', ()=>{
    t.receipts.splice(i,1); logEdit('Money','removed receipt '+(removed.title||'')); save(); rerender();
    toast('Receipt removed', ()=>{ t.receipts.splice(Math.min(i,t.receipts.length),0,removed); logEdit('Money','restored receipt '+(removed.title||'')); save(); rerender(); });
  });
};

/* ================= TAB: photos ================= */
function detectAlbumService(url){
  if(/photocircle|circle38/i.test(url)) return 'PhotoCircle';
  if(/icloud\.com/i.test(url)) return 'Apple Shared Album';
  if(/photos\.(app\.goo\.gl|google\.com)|goo\.gl/i.test(url)) return 'Google Photos';
  return url ? 'Shared album' : '';
}
/* what everyone can actually do with this kind of album link */
function albumNote(service){
  if(service==='PhotoCircle') return 'Everyone with the link can view <strong>and add</strong> photos on iPhone, Android or the web.';
  if(service==='Google Photos') return 'Anyone with the link can view and add photos.';
  if(service==='Apple Shared Album') return 'iPhone users can add photos in the Photos app. Everyone, including Android, can view and download from the link but can\'t add.';
  return 'Anyone with the link can open it.';
}
function tabPhotos(t, ro){
  const a = t.photoAlbum || {url:''};
  const service = a.url ? detectAlbumService(a.url) : '';
  return `
    <p class="muted small" style="margin-bottom:14px">Cal's Trippin' doesn't host photos. It links to one shared album your whole group adds to, so nothing gets lost in the chat.</p>
    ${a.url ? `
      <div class="card">
        <div class="mood-type">${esc(service)}</div>
        <h3 style="word-break:break-all;margin-bottom:8px">${esc(a.url)}</h3>
        <p class="muted small" style="margin-bottom:12px">${albumNote(service)}</p>
        <div class="btn-row">
          <a class="btn primary" href="${esc(a.url)}" target="_blank" rel="noopener">Open Album</a>
          ${!ro?`<button class="btn sm ghost" onclick="App.removeAlbum()">Remove Link</button>`:''}
        </div>
      </div>` : `
      <div class="empty">No shared album linked yet.
        ${!ro?`<br><br><button class="btn primary" onclick="App.albumForm()">+ Add Album Link</button>`:''}
      </div>
      ${!ro?`
      <h2 style="margin-top:30px">Set One Up</h2>
      <div class="banner">📸 <strong>PhotoCircle</strong> works best. It's free, cross-platform, and <strong>everyone can add photos</strong> from iPhone, Android or the web.</div>
      <details open>
        <summary> PhotoCircle (recommended)</summary>
        <div class="d-body"><ol class="steps">
          <li>Everyone installs <strong>PhotoCircle</strong> (App Store / Google Play), or uses the web app at photocircleapp.com.</li>
          <li>Create a <strong>circle</strong> named after the trip.</li>
          <li>Tap <strong>Share / Invite</strong> to get the <strong>invite link</strong> (or QR code).</li>
          <li>Paste that invite link here. Anyone who opens it joins the circle and can add photos from any device.</li>
        </ol></div>
      </details>
      <details>
        <summary> Already use Apple or Google Photos?</summary>
        <div class="d-body">
          <p class="small" style="margin-bottom:10px"><strong>Google Photos:</strong> open the album, tap <strong>Share</strong>, then <strong>Create link</strong>. Turn on <strong>Collaborate</strong> so everyone can add, then paste the link here. Works on iPhone and Android.</p>
          <p class="small"><strong>Apple Shared Album:</strong> in Photos, create a <strong>New Shared Album</strong>, turn on <strong>Public Website</strong> and paste the icloud.com link here. That link is view and download only. Invited iPhone users can add photos, but Android friends can't.</p>
        </div>
      </details>`:''}`}`;
}
App.removeAlbum = () => {
  const t = getTrip(CUR_TRIP_ID); if(!t) return;
  confirmModal('Remove the Album Link?', 'The link will be removed for everyone on this trip. The album itself is not affected.', 'Remove Link', ()=>{
    t.photoAlbum = {url:'', service:''};
    logEdit('Photos','removed the photo album link');
    save(); rerender();
  });
};
App.albumForm = () => {
  const t = getTrip(CUR_TRIP_ID);
  openModal(`
    <h2>Shared Album Link</h2>
    <p class="small" style="margin-bottom:12px">Paste your <strong>PhotoCircle</strong> invite link (recommended), or any Apple/Google album link.</p>
    <div class="field"><label class="label" for="al-url">Album / invite URL</label>
      <input id="al-url" type="url" value="${esc(t.photoAlbum.url||'')}" placeholder="https://photocircleapp.com/…"></div>
    <div class="modal-actions"><button class="btn primary" style="width:100%" onclick="App.saveAlbum()">Save</button></div>`);
};
App.saveAlbum = () => {
  const t = getTrip(CUR_TRIP_ID);
  let url = $('#al-url').value.trim();
  if(url && !/^https?:\/\//i.test(url)) url = 'https://' + url;
  t.photoAlbum = {url, service:detectAlbumService(url)};
  logEdit('Photos', url?('linked '+(detectAlbumService(url)||'a photo album')):'removed the photo album link');
  save(); closeModal(); rerender();
};
/* ================= TAB: mood board ================= */
function tabMood(t, ro){
  const cards = (t.moodBoard||[]).map((m,i)=>`
    <div class="mood-card ${m.title?'has-map':''}">
      ${!ro?`<button class="iconbtn del mood-del" aria-label="Remove pin" title="Remove" onclick="App.delMood(${i})">${ICONS.trash}</button>`:''}
      <div class="mood-type">${m.type}</div>
      ${m.type==='image' && m.dataUrl ? `<img src="${m.dataUrl}" alt="${esc(m.title||'Pinned image')}">` : ''}

      ${m.url?`<a href="${esc(m.url)}" target="_blank" rel="noopener" class="small" style="word-break:break-all">${esc(m.url.replace(/^https?:\/\//,'').slice(0,60))} ↗</a>`:''}
      ${m.text?`<p class="small" style="margin-top:6px;white-space:pre-wrap">${esc(m.text)}</p>`:''}
      ${m.title && !ro?`<div style="margin-top:10px"><button class="btn sm" onclick="App.planFromIdea(${i})">+ Add to Itinerary</button></div>`:''}
      ${m.title?`<a class="mood-map" href="${mapsSearchUrl(t, m.title.replace(/^(Do|Eat|Tip):\s*/,''))}" target="_blank" rel="noopener" aria-label="Open in Google Maps" title="Open in Google Maps">${ICONS.pin}</a>`:''}

}
App.moodForm = () => {
  openModal(`
    <h2>Pin to Board</h2>
    <div class="field"><label class="label" for="md-title">Title</label><input id="md-title" type="text" placeholder="e.g. Sunset at Miradouro"></div>
    <div class="field"><label class="label" for="md-url">Link (optional)</label><input id="md-url" type="url" placeholder="https://…"></div>
    <div class="field"><label class="label" for="md-text">Note (optional)</label><textarea id="md-text" placeholder="Why it's worth doing…"></textarea></div>
    <div class="field"><label class="label" for="md-img">Image (optional)</label><input id="md-img" type="file" accept="image/*" style="border:none;padding:0"></div>
    <div class="modal-actions"><button class="btn primary" style="width:100%" onclick="App.saveMood()">Pin It</button></div>`);
};
App.saveMood = () => {
  const t = getTrip(CUR_TRIP_ID); if(!t) return;
  const title = $('#md-title').value.trim();
  let url = $('#md-url').value.trim();
  if(url && !/^https?:\/\//i.test(url)) url = 'https://' + url;
  const text = $('#md-text').value.trim();
  const fileEl = $('#md-img');
  const pin = extra => {
    if(!title && !url && !text && !extra.dataUrl) return markErr('#md-title','Add a title, link, note or image');
    t.moodBoard.push({id:uid(), type: extra.dataUrl?'image':(url?'link':'note'), title, url, text, ...extra});
    logEdit('Ideas','pinned '+(title||url||'an idea'));
    save(); closeModal(); rerender(); toast('Pinned');
  };
  if(fileEl.files[0]){
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      const scale = Math.min(1, 900/Math.max(img.width,img.height));
      c.width = img.width*scale; c.height = img.height*scale;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      pin({dataUrl: c.toDataURL('image/jpeg',.7)});
    };
    img.src = URL.createObjectURL(fileEl.files[0]);
  } else pin({});
};
App.delMood = i => {
  const t=getTrip(CUR_TRIP_ID); if(!t) return;
  const removed = t.moodBoard[i]; const label = removed.title||removed.url||'a pin';
  t.moodBoard.splice(i,1); logEdit('Ideas','removed '+label); save(); rerender();
  toast('Pin removed', ()=>{ t.moodBoard.splice(Math.min(i,t.moodBoard.length),0,removed); logEdit('Ideas','restored '+label); save(); rerender(); });
};

const SUGG_GENERIC = [
  ['activity','Free walking tour on day one, best way to get your bearings'],
  ['food','Find the main food market and go hungry at lunchtime'],
  ['activity','Ask a local bartender where THEY eat, never fails'],
  ['tip','Screenshot key addresses & tickets in case of no signal'],
  ['activity','One sunrise or sunset viewpoint per trip, minimum'],
  ['tip','Agree a rough daily budget with the group before you land'],
];
App.suggest = () => {
  const t = getTrip(CUR_TRIP_ID); if(!t) return;
  const dest = ((t.destination||'')+' '+t.name+' '+(t.countries||[]).map(c=>(countryByCode(c)||{}).name||'').join(' ')).toLowerCase();
  let list = null, matched = '';
  for(const key of Object.keys(SUGG)){
    if(dest.includes(key)){ list = SUGG[key]; matched = key; break; }
  }
  const items = list || SUGG_GENERIC;
  const label = {activity:'Do', food:'Eat', tip:'Tip'};
  openModal(`
    <h2>✦ Ideas${matched?' for '+esc(matched[0].toUpperCase()+matched.slice(1)):''}</h2>
    <p class="muted small" style="margin-bottom:14px">${list?'Picked for your trip':'General trip ideas. Put a well-known city in the trip name for tailored ones'}. Tap + to pin to the board.</p>
    ${items.map(([type,text],i)=>`
      <div class="sugg">
        <div><span class="badge inv">${label[type]||type}</span><div class="small" style="margin-top:6px">${esc(text)}</div></div>
        <button class="btn sm" onclick="App.addSugg(${i},'${matched}')">+</button>
      </div>`).join('')}`);
};
App.addSugg = (i, key) => {
  const t = getTrip(CUR_TRIP_ID); if(!t) return;
  const items = key && SUGG[key] ? SUGG[key] : SUGG_GENERIC;
  const [type, text] = items[i];
  const title = (type==='food'?'Eat: ':type==='tip'?'Tip: ':'Do: ')+text.split(',')[0].trim();
  t.moodBoard.push({id:uid(), type:'note', title, text, url:''});
  logEdit('Ideas','pinned suggestion '+title);
  save(); rerender(); toast('Pinned to board');
};
